spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/studymatchmaker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsASecretKeyThatIsAtLeast32CharactersLong123!}
    expiration-ms: 86400000
